    <article class="group flex h-full flex-col overflow-hidden rounded-2xl border border-natural-border bg-white shadow-luxe transition hover:-translate-y-1 hover:shadow-xl">
      <button type="button" class="block w-full text-left" (click)="ui.viewItem(item())">
        <div class="relative h-48 overflow-hidden bg-natural-beige">
          <img [src]="item().image" [alt]="item().name" class="h-full w-full object-cover transition duration-500 group-hover:scale-105" />
          <span class="absolute left-3 top-3 rounded-full bg-white/90 px-3 py-1 text-[11px] font-black uppercase tracking-wide text-natural-accent">{{ item().type }}</span>
          @if (item().discountPercent) {
            <span class="absolute right-3 top-3 rounded-xl bg-rose-600 px-2.5 py-1 text-sm font-black text-white shadow-md">-{{ item().discountPercent }}%</span>
          }
        </div>
      </button>
      <div class="flex flex-1 flex-col gap-3 p-4">
        <div class="flex items-start justify-between gap-3">
          <button type="button" class="min-w-0 flex-1 text-left" (click)="ui.viewItem(item())">
            <h3 class="line-clamp-2 min-h-12 font-serif text-lg font-black leading-6 text-natural-ink">{{ item().name }}</h3>
          </button>
          <button type="button" class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-full border border-natural-border transition hover:bg-natural-beige" (click)="ui.toggleFavorite(item())">
            <svg lucideHeart class="h-4 w-4" [class.text-red-500]="ui.isFavorite(item().id)" [class.fill-red-500]="ui.isFavorite(item().id)"></svg>
          </button>
        </div>
        <p class="line-clamp-2 min-h-11 text-sm leading-[1.375rem] text-natural-text/75">{{ item().description || item().specs }}</p>
        <div class="mt-auto flex items-center justify-between gap-3">
          <span class="inline-flex items-center gap-1 text-sm font-bold text-natural-accent">
            <svg lucideStar class="h-4 w-4 fill-natural-gold text-natural-gold"></svg>
            {{ item().rating || 4.8 }} <span class="text-natural-text/45">({{ item().reviewsCount || 'new' }})</span>
          </span>
          <span class="flex flex-col items-end leading-tight">
            @if ((item().originalPrice ?? 0) > item().price) {
              <span class="text-[11px] font-semibold text-stone-400 line-through">{{ item().originalPrice | vnd }}</span>
            }
            <span class="text-sm font-black" [class.text-rose-600]="item().discountPercent" [class.text-natural-ink]="!item().discountPercent">{{ item().price | vnd }}</span>
          </span>
        </div>
        <button type="button" class="btn-sheen inline-flex min-h-11 w-full items-center justify-center gap-2 rounded-xl bg-natural-accent px-4 text-sm font-black text-white transition hover:bg-natural-olive" (click)="addToCart()">
          <svg lucideShoppingBag class="h-4 w-4"></svg>
          {{ cta() }}
        </button>
      </div>
    </article>
